<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlackCat - Forum hacker</title>
    <style>
        /* Minimalist BlackCat Forum Styles */
        
        /* Reset and base styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.6;
            color: #fff;
            background-color: #000;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        /* Background Image */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://cdn.discordapp.com/attachments/1486423872201949314/1487623166762418322/image.png?ex=69c9d089&is=69c87f09&hm=aab14be5c3870b5daddaa841d46380d114d9616d3982744d5edfb868d25ba86e');
            background-size: cover;
            background-position: center;
            opacity: 0.1;
            filter: blur(2px) brightness(0.8);
            z-index: -1;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 1rem;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .header {
            border-bottom: 1px solid #333;
            padding: 1rem 0;
            margin-bottom: 2rem;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 600;
            color: #fff;
            text-shadow: 0 0 5px rgba(255, 255, 255, 0.5);
        }

        .nav {
            display: flex;
            gap: 1.5rem;
        }

        .nav-link {
            text-decoration: none;
            color: #ccc;
            font-weight: 500;
            transition: color 0.2s;
        }

        .nav-link:hover,
        .nav-link.active {
            color: #fff;
        }

        .auth-buttons {
            display: flex;
            gap: 1rem;
        }

        .btn {
            padding: 0.5rem 1rem;
            border: 1px solid #fff;
            background: transparent;
            color: #fff;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }

        .btn:hover {
            background: #fff;
            color: #000;
        }

        .btn-primary {
            border: 1px solid #fff;
        }

        .btn-outline {
            border: 1px solid #fff;
        }

        /* Main Content */
        .main {
            flex: 1;
            margin-bottom: 3rem;
        }

        .section {
            margin-bottom: 2rem;
        }

        .section h2 {
            font-size: 1.3rem;
            margin-bottom: 1rem;
            font-weight: 600;
            color: #fff;
        }

        /* Chat Area */
        .chat-area {
            display: flex;
            flex-direction: column;
            height: 500px;
            border: 1px solid #333;
            border-radius: 0;
            overflow: hidden;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
        }

        .message {
            margin-bottom: 1rem;
            padding: 0.5rem;
            border-bottom: 1px solid #333;
        }

        .message-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.25rem;
            font-size: 0.9rem;
        }

        .message-author {
            font-weight: 600;
            color: #fff;
        }

        .message-time {
            color: #aaa;
        }

        .message-content {
            font-size: 0.95rem;
            color: #ddd;
        }

        /* Message Input */
        .message-input {
            display: flex;
            padding: 1rem;
            border-top: 1px solid #333;
            background: rgba(0, 0, 0, 0.8);
        }

        .message-input input {
            flex: 1;
            padding: 0.5rem;
            border: 1px solid #333;
            border-radius: 0;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            font-size: 1rem;
        }

        .message-input input::placeholder {
            color: #888;
        }

        .message-input button {
            margin-left: 1rem;
            padding: 0.5rem 1rem;
            border: 1px solid #fff;
            background: #fff;
            color: #000;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }

        .message-input button:hover {
            background: #000;
            color: #fff;
        }

        /* Footer */
        .footer {
            border-top: 1px solid #333;
            padding: 1rem 0;
            text-align: center;
            color: #aaa;
            font-size: 0.9rem;
            background: rgba(0, 0, 0, 0.8);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
                gap: 1rem;
            }
            
            .nav {
                width: 100%;
                justify-content: center;
            }
            
            .auth-buttons {
                width: 100%;
                justify-content: center;
            }
            
            .chat-area {
                height: 400px;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="header-content">
                <h1 class="logo">BLACKCAT-BLACKCAT-BLACKCAT-BLACKCAT-BLACKCAT</h1>
            </div>
        </div>
    </header>

    <main class="main">
        <div class="container">
            <section class="section">
                <h2>BlackCat Chat</h2>
                <div class="chat-area">
                    <div class="messages" id="messagesContainer">
                        
                            </div>
                            
                        </div>
                        
                            
                        </div>
                        
                            
                        
                    <div class="message-input">
                        <input type="text" id="messageInput" placeholder="Type your message here..." autocomplete="off">
                        <button id="sendMessage">Send</button>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2013 BlackCat forum, forum for talk</p>
        </div>
    </footer>

    <script>
        // BlackCat Forum functionality
        document.addEventListener('DOMContentLoaded', function() {
            // DOM Elements
            const messagesContainer = document.getElementById('messagesContainer');
            const messageInput = document.getElementById('messageInput');
            const sendMessageButton = document.getElementById('sendMessage');
            const loginBtn = document.getElementById('loginBtn');
            const registerBtn = document.getElementById('registerBtn');

            // Add message function
            function addMessage(content) {
                const now = new Date();
                const timeString = now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                const dateString = now.toLocaleDateString();

                const messageElement = document.createElement('div');
                messageElement.className = 'message';

                messageElement.innerHTML = `
                    <div class="message-header">
                        <span class="message-author">BLACKCAT</span>
                        <span class="message-time">${dateString}, ${timeString}</span>
                    </div>
                    <div class="message-content">${content}</div>
                `;

                messagesContainer.appendChild(messageElement);
                messagesContainer.scrollTop = messagesContainer.scrollHeight;
            }

            // Send message event
            sendMessageButton.addEventListener('click', function() {
                const message = messageInput.value.trim();
                if (message) {
                    addMessage(message);
                    messageInput.value = '';
                }
            });

            // Enter key send
            messageInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    sendMessageButton.click();
                }
            });

            // Login functionality
            loginBtn.addEventListener('click', function() {
                alert('Login functionality would be implemented here.');
            });

            // Register functionality
            registerBtn.addEventListener('click', function() {
                alert('Registration functionality would be implemented here.');
            });
        });
    </script>
</body>
</html>
